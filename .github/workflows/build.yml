name: Build GHCR Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - ".github/**"
      - ".github/*"
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  docker-meta:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      json: ${{ steps.meta.outputs.json }}
    steps:
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

  build:
    runs-on: ubuntu-latest
    needs: docker-meta
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare platform slug
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          platforms: ${{ matrix.platform }}
          push: true
          labels: ${{ needs.docker-meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [docker-meta, build]
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ needs.docker-meta.outputs.json }}')
          images=$(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
          docker buildx imagetools create $tags $images

      - name: Inspect image and get digest
        id: inspect
        run: |
          first_tag=$(echo '${{ needs.docker-meta.outputs.tags }}' | head -1)
          digest=$(docker buildx imagetools inspect "${first_tag}" --format '{{.Manifest.Digest}}')
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign images (Cosign keyless)
        env:
          TAGS: ${{ needs.docker-meta.outputs.tags }}
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          VERSION="${{ github.ref_name }}"

          gh release create "${VERSION}" \
            --generate-notes \
            --title "${VERSION}" \
            --notes "## Container Image

          \`\`\`
          docker pull ${IMAGE}:${VERSION#v}
          \`\`\`

          **Digest:** \`${DIGEST}\`

          **All tags published:**
          $(echo "${{ needs.docker-meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/')"
